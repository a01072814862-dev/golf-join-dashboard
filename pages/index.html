<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프조인 - 호스트 관리 대시보드</title>
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">🏌️ 골프조인</h1>
                <p class="subtitle">호스트 관리</p>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-page="dashboard">
                    <span class="icon">📊</span>
                    <span>대시보드</span>
                </a>
                <a href="#hotdeals" class="nav-item" data-page="hotdeals">
                    <span class="icon">🔥</span>
                    <span>핫딜 관리</span>
                </a>
                <a href="#requests" class="nav-item" data-page="requests">
                    <span class="icon">📬</span>
                    <span>구매요청</span>
                </a>
                <a href="#rounds" class="nav-item" data-page="rounds">
                    <span class="icon">📋</span>
                    <span>라운드 관리</span>
                </a>
                <a href="#settings" class="nav-item" data-page="settings">
                    <span class="icon">⚙️</span>
                    <span>설정</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button id="logoutBtn" class="logout-btn">로그아웃</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h2 id="pageTitle">대시보드</h2>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="userName">호스트</span>
                        <img id="userAvatar" src="https://via.placeholder.com/40" alt="User" class="avatar">
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <div class="content">
                <!-- Dashboard Page -->
                <div id="dashboard-page" class="page active">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">🔥</div>
                            <div class="stat-content">
                                <p class="stat-label">활성 핫딜</p>
                                <p class="stat-value" id="activeHotdeals">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">📬</div>
                            <div class="stat-content">
                                <p class="stat-label">대기 중인 요청</p>
                                <p class="stat-value" id="pendingRequests">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">✅</div>
                            <div class="stat-content">
                                <p class="stat-label">완료된 거래</p>
                                <p class="stat-value" id="completedDeals">0</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">💰</div>
                            <div class="stat-content">
                                <p class="stat-label">총 할인액</p>
                                <p class="stat-value" id="totalDiscount">0원</p>
                            </div>
                        </div>
                    </div>

                    <div class="recent-section">
                        <h3>최근 구매요청</h3>
                        <div id="recentRequests" class="requests-list">
                            <p class="empty-state">구매요청이 없습니다</p>
                        </div>
                    </div>
                </div>

                <!-- Hotdeals Management Page -->
                <div id="hotdeals-page" class="page">
                    <div class="page-header">
                        <h3>핫딜 관리</h3>
                        <button id="addHotdealBtn" class="btn btn-primary">+ 새 핫딜 등록</button>
                    </div>
                    <div id="hotdealsList" class="hotdeals-list">
                        <p class="empty-state">등록된 핫딜이 없습니다</p>
                    </div>
                </div>

                <!-- Requests Management Page -->
                <div id="requests-page" class="page">
                    <div class="page-header">
                        <h3>구매요청 관리</h3>
                        <div class="filter-group">
                            <select id="statusFilter" class="filter-select">
                                <option value="">모든 상태</option>
                                <option value="pending">대기 중</option>
                                <option value="confirmed">확정됨</option>
                                <option value="cancelled">취소됨</option>
                            </select>
                        </div>
                    </div>
                    <div id="requestsList" class="requests-list">
                        <p class="empty-state">구매요청이 없습니다</p>
                    </div>
                </div>

                <!-- Rounds Management Page -->
                <div id="rounds-page" class="page">
                    <div class="page-header">
                        <h3>라운드 관리</h3>
                        <button id="addRoundBtn" class="btn btn-primary">+ 새 라운드 등록</button>
                    </div>
                    <div id="roundsList" class="rounds-list">
                        <p class="empty-state">등록된 라운드가 없습니다</p>
                    </div>
                </div>

                <!-- Settings Page -->
                <div id="settings-page" class="page">
                    <div class="settings-section">
                        <h3>계정 설정</h3>
                        <form id="settingsForm" class="settings-form">
                            <div class="form-group">
                                <label>호스트명</label>
                                <input type="text" id="hostName" class="form-input" placeholder="호스트명">
                            </div>
                            <div class="form-group">
                                <label>이메일</label>
                                <input type="email" id="hostEmail" class="form-input" placeholder="이메일">
                            </div>
                            <div class="form-group">
                                <label>연락처</label>
                                <input type="tel" id="hostPhone" class="form-input" placeholder="010-0000-0000">
                            </div>
                            <button type="submit" class="btn btn-primary">저장</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal for adding hotdeal -->
    <div id="hotdealModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 핫딜 등록</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="hotdealForm" class="modal-form">
                <div class="form-group">
                    <label>골프장명 *</label>
                    <input type="text" id="courseName" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>위치 *</label>
                    <input type="text" id="courseLocation" class="form-input" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>날짜 *</label>
                        <input type="date" id="hotdealDate" class="form-input" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>시간 *</label>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <select id="hotdealHour" class="form-input" style="flex: 1;" required>
                                <option value="">시간 선택</option>
                            </select>
                            <span style="font-size: 18px; font-weight: bold;">:</span>
                            <select id="hotdealMinute" class="form-input" style="flex: 1;" required>
                                <option value="">분 선택</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>원가 *</label>
                        <input type="number" id="originalPrice" class="form-input" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label>할인가 *</label>
                        <input type="number" id="discountedPrice" class="form-input" placeholder="0" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>최소인원 *</label>
                        <input type="number" id="minPlayers" class="form-input" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>최대인원 *</label>
                        <input type="number" id="maxPlayers" class="form-input" value="4" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>설명</label>
                    <textarea id="hotdealDescription" class="form-input" rows="3" placeholder="핫딜 설명"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelHotdealBtn">취소</button>
                    <button type="submit" class="btn btn-primary">등록</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../scripts/main.js"></script>
</body>
</html>
