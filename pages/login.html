<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프조인 - 호스트 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366F1;
            --background-color: #F9FAFB;
            --surface-color: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8B5CF6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me input {
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #4F46E5;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .signup-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background-color: #FEE2E2;
            color: #7F1D1D;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🏌️</div>
            <h1>골프조인</h1>
            <p>호스트 관리 대시보드</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">이메일</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input 
                    type="password" 
                    id="password" 
                    class="form-input" 
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe" style="margin: 0;">로그인 상태 유지</label>
            </div>

            <button type="submit" class="login-btn">로그인</button>
        </form>

        <div class="signup-link">
            계정이 없으신가요? <a href="#signup">회원가입</a>
        </div>
    </div>

    <script>
        // 테스트 계정
        const TEST_CREDENTIALS = {
            email: 'host@example.com',
            password: 'password123',
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            // 테스트 로그인 (실제로는 서버에서 검증)
            if (email === TEST_CREDENTIALS.email && password === TEST_CREDENTIALS.password) {
                // 로그인 성공
                const hostData = {
                    id: 'host_1',
                    name: '호스트 관리자',
                    email: email,
                    phone: '010-0000-0000',
                    loginTime: new Date().toISOString(),
                };

                localStorage.setItem('golf_join_host_data', JSON.stringify(hostData));

                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('golf_join_remember_me', 'true');
                }

                // 대시보드로 이동
                window.location.href = '/web/pages/index.html';
            } else {
                // 로그인 실패
                errorMessage.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
                errorMessage.classList.add('show');
            }
        });

        // 페이지 로드 시 이미 로그인된 경우 대시보드로 이동
        window.addEventListener('load', () => {
            const hostData = localStorage.getItem('golf_join_host_data');
            if (hostData) {
                window.location.href = '/web/pages/index.html';
            }
        });
    </script>
</body>
</html>
