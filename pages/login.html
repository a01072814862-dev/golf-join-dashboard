<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프조인 - 호스트 로그인</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366F1;
            --background-color: #F9FAFB;
            --surface-color: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, #8B5CF6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background-color: var(--surface-color);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .remember-me input {
            cursor: pointer;
        }

        .login-btn {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #4F46E5;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            background-color: #D1D5DB;
            cursor: not-allowed;
        }

        .signup-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .signup-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background-color: #FEE2E2;
            color: #7F1D1D;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            display: none;
            background-color: #DCFCE7;
            color: #166534;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        .test-credentials {
            background-color: #F0F9FF;
            border: 1px solid #BAE6FD;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #0369A1;
        }

        .test-credentials strong {
            display: block;
            margin-bottom: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">🏌️</div>
            <h1>골프조인</h1>
            <p>호스트 관리 대시보드</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div id="loginFormContainer">
            <div class="test-credentials">
                <strong>테스트 계정:</strong>
                이메일: host@example.com<br>
                비밀번호: password123
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input 
                        type="email" 
                        id="email" 
                        class="form-input" 
                        placeholder="your@email.com"
                        value="host@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        value="password123"
                        required
                    >
                </div>

                <div class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" style="margin: 0;">로그인 상태 유지</label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">로그인</button>
            </form>

            <div class="signup-link">
                계정이 없으신가요? <a onclick="showSignup()">회원가입</a>
            </div>
        </div>

        <div id="signupFormContainer" class="hidden">
            <form id="signupForm">
                <div class="form-group">
                    <label for="signupName">이름</label>
                    <input 
                        type="text" 
                        id="signupName" 
                        class="form-input" 
                        placeholder="호스트 이름"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupEmail">이메일</label>
                    <input 
                        type="email" 
                        id="signupEmail" 
                        class="form-input" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupPassword">비밀번호</label>
                    <input 
                        type="password" 
                        id="signupPassword" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="signupPhone">전화번호</label>
                    <input 
                        type="tel" 
                        id="signupPhone" 
                        class="form-input" 
                        placeholder="010-0000-0000"
                    >
                </div>

                <button type="submit" class="login-btn" id="signupBtn">회원가입</button>
            </form>

            <div class="signup-link">
                이미 계정이 있으신가요? <a onclick="showLogin()">로그인</a>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'https://3000-i8851c8pzj4040t73pg87-40c28c45.sg1.manus.computer/api/hotdeal';

        // 로그인 폼 제출
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            errorMessage.classList.remove('show');
            loginBtn.disabled = true;
            loginBtn.textContent = '로그인 중...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || '로그인 실패');
                }

                const data = await response.json();
                
                // 토큰 저장
                localStorage.setItem('golf_join_auth_token', data.token);
                localStorage.setItem('golf_join_host_data', JSON.stringify(data.host));

                if (document.getElementById('rememberMe').checked) {
                    localStorage.setItem('golf_join_remember_me', 'true');
                }

                // 대시보드로 이동
                window.location.href = '/pages/index.html';
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.textContent = error.message || '로그인 중 오류가 발생했습니다.';
                errorMessage.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = '로그인';
            }
        });

        // 회원가입 폼 제출
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const phone = document.getElementById('signupPhone').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const signupBtn = document.getElementById('signupBtn');

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            signupBtn.disabled = true;
            signupBtn.textContent = '회원가입 중...';

            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ name, email, password, phone }),
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.error || '회원가입 실패');
                }

                successMessage.textContent = '회원가입이 완료되었습니다. 로그인해주세요.';
                successMessage.classList.add('show');

                // 1초 후 로그인 폼으로 전환
                setTimeout(() => {
                    showLogin();
                    document.getElementById('email').value = email;
                    document.getElementById('password').value = '';
                }, 1500);
            } catch (error) {
                console.error('Signup error:', error);
                errorMessage.textContent = error.message || '회원가입 중 오류가 발생했습니다.';
                errorMessage.classList.add('show');
                signupBtn.disabled = false;
                signupBtn.textContent = '회원가입';
            }
        });

        // 로그인 폼 표시
        function showLogin() {
            document.getElementById('loginFormContainer').classList.remove('hidden');
            document.getElementById('signupFormContainer').classList.add('hidden');
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // 회원가입 폼 표시
        function showSignup() {
            document.getElementById('loginFormContainer').classList.add('hidden');
            document.getElementById('signupFormContainer').classList.remove('hidden');
            document.getElementById('errorMessage').classList.remove('show');
        }

        // 페이지 로드 시 이미 로그인된 경우 대시보드로 이동
        window.addEventListener('load', () => {
            const token = localStorage.getItem('golf_join_auth_token');
            if (token) {
                window.location.href = '/pages/index.html';
            }
        });
    </script>
</body>
</html>
